trigger: none

parameters:
  - name: REQUEST_ID
    type: string
  - name: PROJECT
    type: string
  - name: ACTION
    type: string
  - name: ENV
    type: string
  - name: VARIABLE
    type: string

pool:
  name: 'sh-skr-test'

variables:
  - group: terraform-dns-record
  - name: WORK_DIR
    value: '$(BASE_DIR)/runs/${{ parameters.REQUEST_ID }}'
  - name: STATE_DIR
    value: '$(BASE_DIR)/state/${{ parameters.ENV }}/${{ parameters.PROJECT }}/$(STACK)'
  - name: VAR_FILE
    value: 'records.auto.tfvars.json'

stages:
  - stage: Bootstrap
    displayName: 'State 저장소 준비 (idempotent)'
    jobs:
      - job: EnsureStateStorage
        steps:
          - checkout: none
          - task: AzureCLI@2
            inputs:
              azureSubscription: 'sh2-service-connection'
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -e
                az group show -n TEST-AKS-RG -o none 2>/dev/null || \
                  az group create -n TEST-AKS-RG -l koreacentral -o none

                az storage account show -n shtesttfstate -g TEST-AKS-RG -o none 2>/dev/null || \
                  az storage account create -n shtesttfstate -g TEST-AKS-RG \
                    --sku Standard_LRS --encryption-services blob -o none

                ACCOUNT_KEY=$(az storage account keys list \
                  --account-name shtesttfstate --resource-group TEST-AKS-RG \
                  --query '[0].value' -o tsv)

                az storage container show -n tfstate --account-name shtesttfstate \
                  --account-key $ACCOUNT_KEY -o none 2>/dev/null || \
                  az storage container create -n tfstate --account-name shtesttfstate \
                    --account-key $ACCOUNT_KEY -o none

  - stage: Prepare
    jobs:
      - job: MergeVariables
        steps:
          - checkout: self

          - script: |
              set -e
              # 파일 경로 설정
              mkdir -p $(WORK_DIR) $(STATE_DIR)
              cd $(WORK_DIR)
              
              # 💡 실패하면 자동으로 멈추되, 에러 내용만 error.log에 덮어씁니다.
              {
              cat << 'EOF' > terraform.tfvars.json
              ${{ parameters.VARIABLE }}
              EOF
              
              mv $(Build.SourcesDirectory)/* $(WORK_DIR)
              
              # 기존 State 파일 확인
              STATE_FILE="$(STATE_DIR)/$(VAR_FILE)"
              if [ -f "$STATE_FILE" ]; then
                cp "$STATE_FILE" $(WORK_DIR)/merged.json
              else
                echo '{"private_dns_records":{}}' > $(WORK_DIR)/merged.json
              fi
              
              # Variable 병합을 위한 키 추출
              jq -c '.private_dns_records[] | "\(.resource_group_name)__\(.dns_zone_name)__\(.name)"' terraform.tfvars.json > record-keys.txt
              
              # Variable 병합
              while read -r target_key; do
                  target_key=$(echo "$target_key" | jq -r .)
                  if [ "${{ parameters.ACTION }}" = "delete" ]; then
                      jq --arg k "$target_key" \
                          '.private_dns_records |= with_entries(select(("\(.value.resource_group_name)__\(.value.dns_zone_name)__\(.value.name)") != $k))' \
                          merged.json > tmp.json && mv tmp.json merged.json
                  else
                      spec=$(jq -c --arg k "$target_key" \
                        '.private_dns_records[] | select("\(.resource_group_name)__\(.dns_zone_name)__\(.name)" == $k)' \
                          terraform.tfvars.json)
                      jq --arg k "$target_key" --argjson spec "$spec" \
                          '.private_dns_records |= (with_entries(select(("\(.value.resource_group_name)__\(.value.dns_zone_name)__\(.value.name)") != $k)) + {($k): $spec})' \
                          merged.json > tmp.json && mv tmp.json merged.json
                  fi
              done < record-keys.txt

              mv merged.json $(VAR_FILE)
              
              cat > backend.hcl <<EOF
              key = "${{ parameters.ENV }}/${{ parameters.PROJECT }}/$(STACK)/terraform.tfstate"
              EOF
              } 2>error.log
            displayName: 'Prepare TFVars'

  - stage: Init
    dependsOn: Prepare
    jobs:
      - job: TerraformInit
        steps:
          - checkout: none
          - task: AzureCLI@2
            inputs:
              azureSubscription: 'sh2-service-connection'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                set -e
                export ARM_ACCESS_KEY=$(az storage account keys list \
                  --account-name shtesttfstate --resource-group TEST-AKS-RG \
                  --query '[0].value' -o tsv)
                cd $(WORK_DIR)
                # 💡 에러가 나면 자동으로 여기서 파이프라인이 멈추고 error.log가 보존됩니다.
                terraform init -backend-config="backend.hcl" 2>error.log
            displayName: 'Terraform Init'

  - stage: Plan
    dependsOn: Init
    jobs:
      - job: TerraformPlan
        steps:
          - checkout: none
          - task: AzureCLI@2
            inputs:
              azureSubscription: 'sh2-service-connection'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                set -e
                export ARM_ACCESS_KEY=$(az storage account keys list \
                  --account-name shtesttfstate --resource-group TEST-AKS-RG \
                  --query '[0].value' -o tsv)
                cd $(WORK_DIR)
                terraform plan -var-file=$(VAR_FILE) -out=tfplan 2>error.log
                terraform show -json tfplan > tfplan.json
            displayName: 'Terraform Plan'

  - stage: NotifyPlanSuccess
    displayName: 'Notify Plan Success'
    dependsOn: Plan
    condition: succeeded('Plan')
    jobs:
      - job: SendPlanResult
        steps:
          - checkout: none
          - task: Bash@3
            displayName: 'Send Plan Result'
            inputs:
              targetType: 'inline'
              script: |
                set -e
                {
                PLAN_JSON=$(cat $(WORK_DIR)/tfplan.json | sed 's/\\/\\\\/g' | sed 's/"/\\"/g' | tr '\n' ' ' | tr '\t' ' ')

                curl -X POST "http://13.124.121.66:8000/api/plan/success" \
                  -H "Content-Type: application/json" \
                  -d @- <<EOF
                {
                  "pipelineId": "$(Build.BuildId)",
                  "status": "plan_success",
                  "requestId": "${{ parameters.REQUEST_ID }}",
                  "planResult": "${PLAN_JSON}"
                }
                EOF
                } 2>$(WORK_DIR)/error.log

  - stage: Apply
    dependsOn: Plan
    jobs:
      - deployment: ApplyJob
        environment: terraform-apply-approval
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: none
                - task: AzureCLI@2
                  inputs:
                    azureSubscription: 'sh2-service-connection'
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      set -e
                      export ARM_ACCESS_KEY=$(az storage account keys list \
                        --account-name shtesttfstate --resource-group TEST-AKS-RG \
                        --query '[0].value' -o tsv)
                      cd $(WORK_DIR)
                      terraform apply -auto-approve tfplan 2>error.log
                      cp $(VAR_FILE) $(STATE_DIR)/$(VAR_FILE)
                  displayName: 'Terraform Apply'

  - stage: NotifyApplySuccess
    displayName: 'Notify Success'
    dependsOn: Apply
    condition: succeeded('Apply')
    jobs:
      - job: SendSuccess
        steps:
          - checkout: none
          - task: Bash@3
            displayName: 'Notify Pipeline Success'
            inputs:
              targetType: 'inline'
              script: |
                curl -X POST "http://13.124.121.66:8000/api/pipeline/success" \
                  -H "Content-Type: application/json" \
                  -d "{\"requestId\": \"${{ parameters.REQUEST_ID }}\"}"

  # global error handler
  - stage: HandleFailure
    displayName: 'Global Error Handler'
    dependsOn:
      - Prepare
      - Init
      - Plan
      - NotifyPlanSuccess
      - Apply
    condition: and(always(), failed())
    jobs:
      - job: SendErrorLog
        steps:
          - checkout: none
          - task: Bash@3
            displayName: 'Notify Pipeline Failure with Local Logs'
            inputs:
              targetType: 'inline'
              script: |
                LOG_FILE="$(WORK_DIR)/error.log"
                ERROR_MSG="상세 에러 로그 파일이 없습니다. Azure DevOps 콘솔을 확인하세요."
                
                if [ -f "$LOG_FILE" ]; then
                  ERROR_MSG=$(cat "$LOG_FILE" | sed 's/"/\\"/g' | tr '\n' ' ')
                fi
                
                curl -X POST "http://13.124.121.66:8000/api/pipeline/failed" \
                  -H "Content-Type: application/json" \
                  -d @- <<EOF
                {
                  "pipelineId": "$(Build.BuildId)",
                  "status": "failed",
                  "failedStage": "$(System.StageName)",
                  "requestId": "${{ parameters.REQUEST_ID }}",
                  "errorMessage": "${ERROR_MSG}"
                }
                EOF
